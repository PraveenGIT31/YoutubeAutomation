name: Daily Video Upload

on:
  schedule:
    - cron: '0 10 * * *' # Runs every day at 10:00 AM UTC (3:30 PM IST)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium
        
    - name: Create token.json from secret
      env:
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      run: |
        echo "$YOUTUBE_TOKEN_JSON" > token.json
        
    - name: Create .env from secret
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
        
    - name: Run Pipeline
      run: python main.py --auto

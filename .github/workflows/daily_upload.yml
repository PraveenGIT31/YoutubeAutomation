name: Daily Video Upload

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium
        
    - name: Create token.json from secret
      env:
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      run: |
        echo "$YOUTUBE_TOKEN_JSON" > token.json
        
    - name: Create .env from secret
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
        
    - name: Run Pipeline
      run: python main.py --auto
      
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add processed_repos.json
        git commit -m "Update processed repos list [skip ci]" || echo "No changes to commit"
        git push
